name: Node Service CI

on:
  workflow_call:
    inputs:
      service-path:
        description: 'Path to the service root (e.g. services/web)'
        required: true
        type: string
      image-name:
        description: 'Full image name including registry (e.g. ghcr.io/org/web)'
        required: true
        type: string
      push-image:
        description: 'Push the built image to the registry'
        required: true
        type: boolean
      trivy-severity:
        description: 'Comma-separated severity levels that cause a non-zero exit. Empty = informational only.'
        required: false
        type: string
        default: ''

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ inputs.service-path }}/package-lock.json
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install
        working-directory: ${{ inputs.service-path }}
        run: task install
      - name: Lint
        working-directory: ${{ inputs.service-path }}
        run: task lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ inputs.service-path }}/package-lock.json
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install
        working-directory: ${{ inputs.service-path }}
        run: task install
      - name: Test
        working-directory: ${{ inputs.service-path }}
        run: task test

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ inputs.service-path }}/package-lock.json
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install
        working-directory: ${{ inputs.service-path }}
        run: task install
      - name: Audit
        working-directory: ${{ inputs.service-path }}
        run: task audit

  build-image:
    name: Build image
    runs-on: ubuntu-latest
    needs: [lint, test, npm-audit]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        if: inputs.push-image
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=sha
            type=edge,branch=main
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ${{ inputs.service-path }}
          push: ${{ inputs.push-image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6 # v3.94.3
        with:
          extra_args: --only-verified

  trivy:
    name: Trivy scan
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.service-path }}
          format: sarif
          output: trivy-results.sarif
          severity: ${{ inputs.trivy-severity != '' && inputs.trivy-severity || 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN' }}
          exit-code: ${{ inputs.trivy-severity != '' && '1' || '0' }}
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: trivy-results.sarif
