name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/_go-service.yml'
            web:
              - 'services/web/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/_node-service.yml'

  api-ci:
    name: API
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    uses: ./.github/workflows/_go-service.yml
    permissions:
      contents: read
      packages: write
      security-events: write
    with:
      service-path: services/api
      image-name: ghcr.io/lvermeire/api
      push-image: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
      trivy-severity: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && 'HIGH,CRITICAL' || '' }}

  web-ci:
    name: Web
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    uses: ./.github/workflows/_node-service.yml
    permissions:
      contents: read
      packages: write
      security-events: write
    with:
      service-path: services/web
      image-name: ghcr.io/lvermeire/web
      push-image: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
      trivy-severity: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && 'HIGH,CRITICAL' || '' }}

  # Gate job: always runs, fails if any upstream job failed or was cancelled.
  # Branch protection requires only this check, not the individual service jobs.
  # When a service's paths didn't change, its job is "skipped" — that's fine here.
  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [detect-changes, api-ci, web-ci]
    if: always()
    steps:
      - name: Check all jobs passed or were skipped
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          if echo "$RESULTS" | jq -e '[.[].result] | any(. == "failure" or . == "cancelled")' > /dev/null; then
            echo "One or more jobs failed or were cancelled."
            echo "$RESULTS" | jq '[to_entries[] | {job: .key, result: .value.result}]'
            exit 1
          fi
          echo "All jobs passed or were skipped."
