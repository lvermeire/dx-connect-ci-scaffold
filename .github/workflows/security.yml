name: Security

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  trivy-api:
    name: Trivy — API
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: services/api
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          exit-code: '0'
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-api.sarif

  trivy-web:
    name: Trivy — Web
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: services/web
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          exit-code: '0'
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-web.sarif

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache: true
      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Audit
        working-directory: services/api
        run: task audit

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install
        working-directory: services/web
        run: task install
      - name: Audit
        working-directory: services/web
        run: task audit

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@v3.94.3
        with:
          extra_args: --only-verified
