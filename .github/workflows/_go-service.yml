name: Go Service CI

on:
  workflow_call:
    inputs:
      service-path:
        description: 'Path to the service root (e.g. services/api)'
        required: true
        type: string
      image-name:
        description: 'Full image name including registry (e.g. ghcr.io/org/api)'
        required: true
        type: string
      push-image:
        description: 'Push the built image to the registry'
        required: true
        type: boolean
      trivy-severity:
        description: 'Comma-separated severity levels that cause a non-zero exit. Empty = informational only.'
        required: false
        type: string
        default: ''

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.service-path }}/go.mod
          cache: true
      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin v2.11.4
      - name: Lint
        working-directory: ${{ inputs.service-path }}
        run: task lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.service-path }}/go.mod
          cache: true
      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Test
        working-directory: ${{ inputs.service-path }}
        run: task test

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.service-path }}/go.mod
          cache: true
      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Audit
        working-directory: ${{ inputs.service-path }}
        run: task audit

  build-image:
    name: Build image
    runs-on: ubuntu-latest
    needs: [lint, test, govulncheck]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: inputs.push-image
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=sha
            type=edge,branch=main
      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service-path }}
          push: ${{ inputs.push-image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@v3.94.3
        with:
          extra_args: --only-verified

  trivy:
    name: Trivy scan
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.service-path }}
          format: sarif
          output: trivy-results.sarif
          severity: ${{ inputs.trivy-severity != '' && inputs.trivy-severity || 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN' }}
          exit-code: ${{ inputs.trivy-severity != '' && '1' || '0' }}
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
